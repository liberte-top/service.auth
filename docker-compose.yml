services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgres://auth:auth@db:5432/auth
      PORT: "3333"
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
    environment:
      VITE_AUTH_API_BASE_URL: http://api:3333
    ports:
      - "5173:5173"
    depends_on:
      - api

  e2e:
    image: mcr.microsoft.com/playwright:v1.55.0-jammy
    working_dir: /workspace
    volumes:
      - ./e2e:/workspace
    depends_on:
      - web
    profiles:
      - e2e
