services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth}
      POSTGRES_USER: ${POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth}
    ports:
      - "${DB_PUBLIC_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth} -d ${POSTGRES_DB:-auth}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://auth:auth@db:5432/auth}
      PORT: "${API_PORT:-3333}"
      MAIL_GRPC_ADDR: http://mail:50051
    ports:
      - "${API_PORT:-3333}:3333"
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    networks:
      default:
        aliases:
          - auth-api

  mail:
    build:
      context: .
      dockerfile: mail/Dockerfile
    environment:
      PORT: "${MAIL_PORT:-50051}"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Auth <auth@mail.liberte.top>}
    ports:
      - "${MAIL_PORT:-50051}:50051"

  web:
    build:
      context: ..
      dockerfile: service.auth/web/Dockerfile
      args:
        VITE_ENV_LABEL: ${WEB_VITE_ENV_LABEL:-compose}
    environment:
      AUTH_API_INTERNAL_URL: http://auth-api:3333
    ports:
      - "${WEB_PUBLIC_PORT:-5173}:80"
    depends_on:
      - api
