name: ci.deploy.web

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.web.yml"

jobs:
  build-test-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Install dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        working-directory: web
        env:
          VITE_AUTH_API_BASE_URL: http://localhost:3333
          VITE_ENV_LABEL: ci
        run: pnpm build

      - name: Build web image
        run: docker build ./web
