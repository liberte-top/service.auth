name: ci.deploy.web

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.web.yml"
  pull_request:
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.web.yml"

jobs:
  build-test-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout packages repo for local-link dependency
        run: |
          set -euo pipefail
          rm -rf ../packages
          git clone "https://x-access-token:${{ secrets.KUBERNETES_REPO_TOKEN }}@github.com/liberte-top/packages.git" ../packages

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web
        working-directory: web
        env:
          APP_BUILD_SHA: ${{ github.sha }}
          APP_BUILD_TIMESTAMP: ${{ github.run_id }}
          VITE_ENV_LABEL: ci
        run: pnpm build

      - name: Build web image
        run: |
          docker build .. \
            --file ./web/Dockerfile \
            --build-arg APP_BUILD_SHA="${GITHUB_SHA}" \
            --build-arg APP_BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Capture build timestamp
        if: github.event_name != 'pull_request'
        id: build_meta
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push web image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ..
          file: ./web/Dockerfile
          push: true
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            APP_BUILD_TIMESTAMP=${{ steps.build_meta.outputs.timestamp }}
          tags: |
            ghcr.io/liberte-top/service-auth-web:main
            ghcr.io/liberte-top/service-auth-web:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Update auth-web image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/charts/service/auth/values.yaml')
          replacement = '    tag: sha-${{ github.sha }} # auth-web-image'
          lines = []
          for line in path.read_text().splitlines():
            if line.strip().endswith('# auth-web-image'):
              line = replacement
            lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/auth-web-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote auth-web image"
          title: "chore: promote auth-web image"
          body: |
            Update `auth-web` to `ghcr.io/liberte-top/service-auth-web:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number" || {
            gh pr update-branch --repo "liberte-top/kubernetes" "$pr_number" --rebase
            gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number"
          }
