name: ci.deploy.web

on:
  workflow_dispatch:
    inputs:
      kube_namespace:
        description: Kubernetes namespace
        required: false
        default: service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/liberte-top/service-auth-web:${{ github.sha }}
      KUBE_NAMESPACE: ${{ github.event.inputs.kube_namespace || 'service' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build Web app
        run: pnpm build
        working-directory: web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy Web image
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,KUBE_NAMESPACE
          script: |
            set -eu
            kubectl -n "${KUBE_NAMESPACE}" set image deployment/auth-web auth-web="${IMAGE}"
            kubectl -n "${KUBE_NAMESPACE}" rollout status deployment/auth-web --timeout=180s
        env:
          IMAGE: ${{ env.IMAGE }}
          KUBE_NAMESPACE: ${{ env.KUBE_NAMESPACE }}

      - name: Publish deploy summary
        run: |
          {
            echo "## Web Deployment"
            echo
            echo "- Image: \`${IMAGE}\`"
            echo "- Namespace: \`${KUBE_NAMESPACE}\`"
            echo "- Tag policy: immutable SHA only (no \`latest\`)"
            echo "- Manual promotion: sync this SHA into kubernetes repo manifests for stable release."
          } >> "${GITHUB_STEP_SUMMARY}"
