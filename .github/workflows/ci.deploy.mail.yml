name: ci.deploy.mail

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "mail/**"
      - "proto/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.mail.yml"
  pull_request:
    paths:
      - "mail/**"
      - "proto/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.mail.yml"

jobs:
  build-test-mail:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mail -> target

      - name: Build mail
        working-directory: mail
        run: cargo build --locked

      - name: Capture build timestamp
        id: build_meta
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mail image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./mail/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=service-auth-mail
          cache-to: type=gha,mode=max,scope=service-auth-mail
          tags: |
            ghcr.io/liberte-top/service-auth-mail:main
            ghcr.io/liberte-top/service-auth-mail:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Update auth-mail image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/charts/service/auth/values.yaml')
          replacement = '    tag: sha-${{ github.sha }} # auth-mail-image'
          lines = []
          for line in path.read_text().splitlines():
              if line.strip().endswith('# auth-mail-image'):
                  line = replacement
              lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/auth-mail-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote auth-mail image"
          title: "chore: promote auth-mail image"
          body: |
            Update `auth-mail` to `ghcr.io/liberte-top/service-auth-mail:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number" || {
            gh pr update-branch --repo "liberte-top/kubernetes" "$pr_number" --rebase
            gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number"
          }
