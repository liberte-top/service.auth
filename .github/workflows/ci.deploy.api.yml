name: ci.deploy.api

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"
  pull_request:
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"

jobs:
  build-test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: api
        run: cargo test --locked

      - name: Build API image
        run: |
          docker build ./api \
            --build-arg APP_BUILD_SHA="${GITHUB_SHA}" \
            --build-arg APP_BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Capture build timestamp
        if: github.event_name != 'pull_request'
        id: build_meta
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
            APP_BUILD_TIMESTAMP=${{ steps.build_meta.outputs.timestamp }}
          tags: |
            ghcr.io/liberte-top/service-auth-api:main
            ghcr.io/liberte-top/service-auth-api:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Update auth-api image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/manifests/service/auth/api/deployment.yaml')
          replacement = 'ghcr.io/liberte-top/service-auth-api:sha-${{ github.sha }}'
          lines = []
          for line in path.read_text().splitlines():
            stripped = line.strip()
            if stripped.startswith('image: ') and 'ghcr.io/liberte-top/service-auth-api:' in stripped:
              indent = line[:len(line) - len(line.lstrip())]
              line = f'{indent}image: {replacement}'
            lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/auth-api-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote auth-api image"
          title: "chore: promote auth-api image"
          body: |
            Update `auth-api` to `ghcr.io/liberte-top/service-auth-api:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: gh pr merge --repo "liberte-top/kubernetes" --auto --squash "${{ steps.create_pr.outputs.pull-request-number }}"
