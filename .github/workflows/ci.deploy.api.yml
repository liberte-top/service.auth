name: ci.deploy.api

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"
  pull_request:
    paths:
      - "api/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.deploy.api.yml"

jobs:
  build-test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Run tests
        working-directory: api
        run: cargo test --locked

      - name: Build API image
        run: docker build ./api

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/liberte-top/service-auth-api:main
            ghcr.io/liberte-top/service-auth-api:sha-${{ github.sha }}
